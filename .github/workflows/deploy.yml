name: Deploy

# Per project requirements, this workflow runs ONLY when master is updated.
on:
  push:
    branches: [master]

# Never run overlapping deploys against the same ref — let newer pushes queue.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (pytest · Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check .
      - name: Run pytest
        env:
          # Fallback to a dummy value so tests still run when real secrets aren't configured
          # yet (the deploy job is what forwards the real values to the VPS via setup-vps.sh).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || 'ci-dummy' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'ci-dummy' }}
        run: pytest -q

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Push the deploy/ directory (the bash script + systemd unit file) onto
      # the VPS where the main deploy script will exec it.
      - name: Copy deploy script + systemd unit to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/"
          target: "/tmp/telegram-ai-bot-deploy/"

      # Then SSH into the VPS and run the script. All required + optional env
      # vars are forwarded to the remote shell, where the script reads them.
      - name: Run setup script on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO: ${{ github.repository }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || '' }}
          TELEGRAM_BASE_URL: ${{ secrets.TELEGRAM_BASE_URL || '' }}
          TELEGRAM_BASE_FILE_URL: ${{ secrets.TELEGRAM_BASE_FILE_URL || '' }}
          SYSTEM_PROMPT: ${{ vars.SYSTEM_PROMPT || 'You are a helpful assistant. Be concise, friendly, and clear. Format answers using Markdown when it improves readability.' }}
          MAX_HISTORY_MESSAGES: ${{ vars.MAX_HISTORY_MESSAGES || '20' }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/telegram-ai-bot' }}
          SERVICE_USER: ${{ vars.SERVICE_USER || 'telegram-bot' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            bash /tmp/telegram-ai-bot-deploy/setup-vps.sh
